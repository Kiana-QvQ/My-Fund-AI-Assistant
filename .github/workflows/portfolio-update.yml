name: Update Portfolio Dashboard

on:
  workflow_dispatch:
    inputs:
      alert_mode:
        description: "Email: auto (buy-signal only) / force / skip"
        required: false
        default: auto
  schedule:
    # 09:00 CST: refresh + at most one buy-action email (if PE below threshold).
    # 21:00 CST: refresh dashboard only (A-share close PE), no email.
    # GitHub cron may delay by several minutes.
    - cron: "0 1 * * 1-5"
    - cron: "0 13 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install data dependencies
        run: python -m pip install -r requirements-data.txt

      - name: Resolve alert mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.alert_mode }}"
            MODE="${MODE:-auto}"
          else
            case "${{ github.event.schedule }}" in
              # Morning action window: may send one email if buy signal exists.
              "0 1 * * 1-5") MODE="auto" ;;
              # Evening valuation refresh only.
              "0 13 * * 1-5") MODE="skip" ;;
              *) MODE="auto" ;;
            esac
          fi
          echo "value=${MODE}" >> "$GITHUB_OUTPUT"
          echo "Alert mode: ${MODE}"

      - name: Refresh market snapshot
        run: python scripts/refresh_market_snapshot.py --principal 10000

      - name: Update README dashboard
        run: python scripts/update_portfolio_readme.py

      # Commit before email so SMTP failures never block dashboard updates.
      - name: Commit dashboard changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f README.md data/market_snapshot.json data/portfolio_status.json
          git diff --cached --quiet || git commit -m "自动更新持仓与今日投资判断"
          git push

      - name: Send trade alert email
        if: steps.mode.outputs.value != 'skip'
        continue-on-error: true
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MONTHLY_BUDGET: ${{ secrets.MONTHLY_BUDGET }}
        run: |
          if [ -z "${MONTHLY_BUDGET}" ]; then
            unset MONTHLY_BUDGET
            BUDGET=300
          else
            BUDGET="${MONTHLY_BUDGET}"
          fi
          EXTRA=""
          if [ "${{ steps.mode.outputs.value }}" = "force" ]; then
            EXTRA="--force"
          fi
          python scripts/send_trade_alert_email.py --monthly "${BUDGET}" ${EXTRA}

name: Update Portfolio Dashboard

on:
  workflow_dispatch:
    inputs:
      alert_mode:
        description: "Email: auto / weekly_dca / event / force_dca / force_build / skip"
        required: false
        default: auto
  schedule:
    # ~09:07 CST Mon–Fri (UTC 01:07, off the hour to reduce GitHub cron queue delay)
    # GitHub cron is best-effort. A-share holidays still allow fresh US/event alerts.
    - cron: "7 1 * * 1-5"

permissions:
  contents: write

concurrency:
  group: portfolio-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history so rebase can recover when remote moved during the run.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install data dependencies
        run: python -m pip install -r requirements-data.txt

      - name: Syntax check (py_compile)
        run: python -m compileall -q app scripts tests

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Check A-share trading day
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"
            echo "run_us=yes" >> "$GITHUB_OUTPUT"
            echo "Manual run: full refresh enabled"
          else
            python scripts/trading_calendar.py --github-output
            echo "run_us=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve alert mode
        id: mode
        if: steps.gate.outputs.run == 'yes' || steps.gate.outputs.run_us == 'yes'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.alert_mode }}"
            MODE="${MODE:-auto}"
          else
            MODE="auto"
            if [ "${{ steps.gate.outputs.run }}" != "yes" ]; then
              # A股休市：仍发动态事件信（溢价/建仓/美股档位），不发周四定投周报
              MODE="event"
            fi
          fi
          echo "value=${MODE}" >> "$GITHUB_OUTPUT"
          echo "Alert mode: ${MODE}"

      - name: Refresh market snapshot (A-share trading day)
        if: steps.gate.outputs.run == 'yes'
        run: python scripts/refresh_market_snapshot.py --principal 10000

      - name: Refresh US valuation only (A-share holiday)
        if: steps.gate.outputs.run != 'yes' && steps.gate.outputs.run_us == 'yes'
        run: |
          python scripts/us_pe.py
          python - <<'PY'
          import json
          from pathlib import Path
          import sys
          sys.path.insert(0, "scripts")
          from us_pe import merge_us_into_market_snapshot
          from index_drawdown import attach_drawdowns
          from qdii_premium import fetch_qdii_premiums
          root = Path(".")
          snap_path = root / "data" / "market_snapshot.json"
          us_path = root / "config" / "us_pe_snapshot.json"
          if snap_path.is_file() and us_path.is_file():
              snap = json.loads(snap_path.read_text(encoding="utf-8"))
              us = json.loads(us_path.read_text(encoding="utf-8"))
              merged = merge_us_into_market_snapshot(snap, us)
              premiums = fetch_qdii_premiums()
              for name, item in premiums.items():
                  if name in merged.setdefault("indexes", {}):
                      merged["indexes"][name].update({
                          "qdii_premium": item.get("premium"),
                          "qdii_premium_pct": item.get("premium_pct"),
                          "qdii_etf": item.get("etf_code"),
                          "qdii_premium_status": item.get("status"),
                          "qdii_premium_reason": item.get("reason"),
                      })
              attach_drawdowns(merged.setdefault("indexes", {}))
              snap_path.write_text(
                  json.dumps(merged, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )
              print("merged US valuation + drawdowns into market_snapshot.json")
          PY

      - name: Update README dashboard
        if: steps.gate.outputs.run == 'yes' || steps.gate.outputs.run_us == 'yes'
        run: python scripts/update_portfolio_readme.py

      - name: Send DCA / build alert emails
        id: email
        if: (steps.gate.outputs.run == 'yes' || steps.gate.outputs.run_us == 'yes') && steps.mode.outputs.value != 'skip'
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          MODE="${{ steps.mode.outputs.value }}"
          case "${MODE}" in
            weekly_dca) python scripts/send_trade_alert_email.py --mode weekly_dca --persist-state ;;
            event) python scripts/send_trade_alert_email.py --mode event --persist-state ;;
            force_dca) python scripts/send_trade_alert_email.py --mode force_dca --persist-state ;;
            force_build) python scripts/send_trade_alert_email.py --mode force_build --persist-state ;;
            *) python scripts/send_trade_alert_email.py --mode auto --persist-state ;;
          esac

      - name: Commit dashboard + alert state (single push)
        if: steps.gate.outputs.run == 'yes' || steps.gate.outputs.run_us == 'yes'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f README.md data/market_snapshot.json data/portfolio_status.json
          git add -f config/us_pe_snapshot.json data/sp500_pe_multpl.json
          git add -f data/alert_state.json || true
          if [ -f data/ndx_pe_yfinance_ref.json ]; then
            git add -f data/ndx_pe_yfinance_ref.json
          fi
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            git commit -m "自动更新持仓、估值与邮件状态指纹"
          fi

          BRANCH="${GITHUB_REF_NAME:-main}"
          AUTO_PATHS=(
            README.md
            data/market_snapshot.json
            data/portfolio_status.json
            config/us_pe_snapshot.json
            data/sp500_pe_multpl.json
            data/alert_state.json
            data/ndx_pe_yfinance_ref.json
          )
          resolve_auto_paths() {
            for f in "${AUTO_PATHS[@]}"; do
              if git ls-files -u -- "$f" | grep -q .; then
                # During rebase: "theirs" = our commit being replayed.
                git checkout --theirs -- "$f"
                git add -f "$f"
              fi
            done
          }

          # Remote often moves while this job runs (manual push / overlapping agent).
          # Retry: fetch → rebase → push; keep this run's dashboard/alert artifacts on conflict.
          git fetch origin "${BRANCH}"
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse "origin/${BRANCH}")" ]; then
            echo "Already synced with origin/${BRANCH}."
            exit 0
          fi
          # Behind remote and nothing unique to publish (no local commit this run).
          if git merge-base --is-ancestor HEAD "origin/${BRANCH}"; then
            echo "Remote is ahead and this run has no new commit to push; done."
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            git fetch origin "${BRANCH}"
            if git push origin "HEAD:${BRANCH}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/${BRANCH}..."
            if ! GIT_EDITOR=true git rebase "origin/${BRANCH}"; then
              resolve_auto_paths
              if ! GIT_EDITOR=true git rebase --continue; then
                echo "Rebase failed on attempt ${attempt}."
                git rebase --abort || true
                sleep $((attempt * 2))
                continue
              fi
            fi
            sleep $((attempt))
          done
          echo "Failed to push after 5 rebase retries."
          exit 1

      - name: Skip notice
        if: steps.gate.outputs.run != 'yes' && steps.gate.outputs.run_us != 'yes'
        run: echo "已跳过刷新。"

      - name: Holiday US-only notice
        if: steps.gate.outputs.run != 'yes' && steps.gate.outputs.run_us == 'yes'
        run: echo "今天不是 A 股交易日：已刷新美股估值与 README；可发送动态事件邮件（无定投周报）。"

      - name: Failure notice
        if: failure()
        shell: bash
        run: |
          {
            echo "### 工作流失败"
            echo ""
            echo "- 计划约 **每周四 09:07 CST** 发定投周报；工作日同一时刻检测档位/建仓事件。"
            echo "- 周四若需招行操作：约 **10:00 CST** 前请到 Actions 确认 run 是否成功。"
            echo "- 失败不等于「今天无信号」。"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Workflow failed — see job Summary."

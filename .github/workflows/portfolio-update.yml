name: Update Portfolio Dashboard

on:
  workflow_dispatch:
  schedule:
    # 09:00 and 21:00 China Standard Time, with GitHub's normal schedule delay.
    - cron: "0 1,13 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install data dependencies
        run: python -m pip install -r requirements-data.txt

      - name: Refresh market snapshot
        run: python scripts/refresh_market_snapshot.py --principal 10000

      - name: Update README dashboard
        run: python scripts/update_portfolio_readme.py

      - name: Commit dashboard changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/market_snapshot.json data/portfolio_status.json
          git diff --cached --quiet || git commit -m "自动更新持仓与今日投资判断"
          git push
